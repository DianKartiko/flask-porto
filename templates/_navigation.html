<nav
  class="sticky top-0 z-50 w-full rounded-sm border border-zinc-200/50 bg-white/55 backdrop-blur-xl backdrop-saturate-150 transition-all duration-300 md:rounded-full dark:border-zinc-700/50 dark:bg-zinc-950/50"
>
  <div class="mx-auto w-full max-w-4xl px-4 md:px-6">
    <div class="flex h-14 items-center justify-between lg:h-16">
      <div class="flex-shrink-0">
        <a href="/" class="group flex items-center gap-2">
          <!-- Profile Picture menggunakan div + bg-image -->
          <div
            class="h-8 w-8 rounded-full bg-cover bg-no-repeat shadow-sm ring-1 ring-zinc-900/10"
            style="background-image: url('{{ url_for('static', filename='img/profile.png') }}');"
            role="img"
            aria-label="Profile Photo"
          ></div>

          <div class="text-base font-bold text-zinc-950 dark:text-white">
            baseleus.
          </div>
        </a>
      </div>

      <div class="hidden flex-1 items-center justify-center md:flex">
        <div class="flex items-center space-x-6 lg:space-x-8">
          {% include "components/_navmenu.html" %}
        </div>
      </div>

      <div class="flex flex-shrink-0 items-center gap-1">
        <button
          id="theme-toggle"
          class="cursor-pointer rounded-full bg-zinc-50 p-2 text-zinc-600 ring-1 ring-zinc-100 transition-colors duration-150 hover:text-zinc-900 focus:outline-none dark:bg-zinc-900 dark:text-zinc-400 dark:ring-zinc-800 dark:hover:text-white"
        >
          <i data-lucide="sun" class="hidden h-5 w-5 dark:block"></i>
          <i data-lucide="moon" class="block h-5 w-5 dark:hidden"></i>
        </button>

        <div class="flex md:hidden">
          <button
            id="mobile-menu-btn"
            class="p-2 text-zinc-600 hover:text-zinc-900 focus:outline-none dark:text-zinc-400 dark:hover:text-white"
          >
            <i data-lucide="menu" id="icon-menu" class="block h-6 w-6"></i>
            <i data-lucide="x" id="icon-close" class="hidden h-6 w-6"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div
    id="mobile-menu"
    class="absolute inset-x-0 top-full max-h-0 overflow-hidden rounded-sm bg-white opacity-0 shadow-xl transition-all duration-500 ease-in-out md:hidden dark:bg-zinc-900"
  >
    <div class="border-t border-zinc-100 dark:border-zinc-800">
      <div class="px-4 pt-4 pb-8">
        <div class="flex flex-col space-y-2">
          {% for item in left_menu %} {% set is_active = request.path ==
          item.href %}

          <a
            href="{{ item.href }}"
            class="block rounded-lg px-4 py-3 text-sm font-medium transition-all duration-300 transform translate-y-4 opacity-0 mobile-link-item
                              {{ 'bg-zinc-100 font-bold text-zinc-900 dark:bg-zinc-800 dark:text-white' if is_active else 'text-zinc-600 hover:bg-zinc-50 hover:text-zinc-900 dark:text-zinc-400 dark:hover:bg-zinc-900 dark:hover:text-white' }}"
          >
            {{ item.label }}
          </a>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>
</nav>
